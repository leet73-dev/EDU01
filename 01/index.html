<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독도 역사 연표 - 우리 땅 독도의 기록</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --timeline-line: #ccc;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .category-title {
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 40px 0 20px 0;
            font-weight: bold;
        }

        /* Timeline Main Style */
        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: var(--timeline-line);
            top: 0;
            bottom: 0;
            left: 20px;
            margin-left: -2px;
        }

        .event {
            padding: 15px 40px;
            position: relative;
            background-color: inherit;
            width: 100%;
            transition: 0.3s;
        }

        .event::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 12px;
            background-color: white;
            border: 4px solid var(--accent-color);
            top: 20px;
            border-radius: 50%;
            z-index: 1;
        }

        .event-content {
            padding: 20px;
            background-color: white;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .event:hover .event-content {
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.2);
            transform: translateY(-2px);
        }

        .year {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .description {
            font-size: 1rem;
            color: #555;
        }

        .highlight {
            color: #e67e22;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: #888;
            font-size: 0.9rem;
        }

        /* Mobile Adjustments */
        @media screen and (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .event { padding-left: 50px; }
        }
    </style>
</head>
<body>

<header>
    <h1>독도 역사 연표</h1>
    <p>형성과 기록, 그리고 수호의 역사</p>
</header>

<div class="container">
    <div class="category-title">1. 선사 및 조선 시대: 기록과 수호의 시작</div>
    <div class="timeline" id="section1">
        </div>

    <div class="category-title">2. 근대: 근거 확립과 일본의 침탈</div>
    <div class="timeline" id="section2">
        </div>

    <div class="category-title">3. 현대: 해방과 계속되는 갈등</div>
    <div class="timeline" id="section3">
        </div>
</div>

<footer>
    <p>&copy; 독도 역사 아카이브 - 대한민국의 아름다운 섬, 독도</p>
</footer>

<script>
    // 연표 데이터 배열
    const data1 = [
        { year: "약 460만 년~250만 년 전", desc: "화산 활동으로 인해 <span class='highlight'>독도 형성</span> (울릉도보다 먼저 탄생)" },
        { year: "1454년", desc: "《세종실록지리지》 발행. 우산(독도)과 무릉(울릉도)이 울진현 동쪽 바다에 있으며, 날씨가 맑으면 서로 보인다고 기록됨" },
        { year: "1481년", desc: "《신증동국여지승람》에 첨부된 <span class='highlight'>〈팔도총도〉</span>에 울릉도와 독도가 표기됨" },
        { year: "1667년", desc: "일본의 《은주시청합기》에서 일본의 서쪽 경계를 오키섬으로 정의하며 독도를 일본 영역 밖으로 인식함" },
        { year: "1693년", desc: "제1차 안용복 사건. 일본으로 납치된 안용복이 독도의 조선 영유권을 주장함" },
        { year: "1696년", desc: "제2차 안용복 사건 및 일본의 '죽도 도해 금지령' 하달. 막부가 독도가 조선 땅임을 인정함" },
        { year: "1697년", desc: "조선 정부, '울릉도 수토관 제도'를 신설하여 1894년까지 정기 시찰함" },
        { year: "1785년", desc: "일본 실학자 하야시 시헤이의 <span class='highlight'>〈삼국접양지도〉</span>에서 독도를 조선의 것으로 명기함" }
    ];

    const data2 = [
        { year: "1870년", desc: "일본 외무성 보고서 《조선국 교제시말 내탐서》에서 독도가 조선에 속한 사정을 보고함" },
        { year: "1877년", desc: "<span class='highlight'>'태정관 지령'</span>을 통해 일본 정부가 독도는 일본과 관계없음을 공식 확인" },
        { year: "1900년 10월 25일", desc: "대한제국 칙령 제41호 선포. 독도를 울릉군의 관할 구역으로 공식 편입" },
        { year: "1905년 1월 28일", desc: "일본 내각이 독도 편입을 결정" },
        { year: "1905년 2월 22일", desc: "시마네현 고시 제40호. 일본이 독도를 '다케시마'라 부르며 영토 주장을 시작함" }
    ];

    const data3 = [
        { year: "1946년 1월 29일", desc: "연합군 최고사령관 지령(SCAPIN 제677호). 독도를 일본 통치 범위에서 제외" },
        { year: "1952년 1월 18일", desc: "대한민국 정부, '평화선(이승만 라인)' 선포를 통해 영유권 공고화" },
        { year: "1953년 7월", desc: "독도경비대 상주 시작" },
        { year: "1954년/1962년", desc: "일본의 국제사법재판소(ICJ) 회부 제안을 한국이 거부함" },
        { year: "1981년", desc: "최종덕 씨, 최초의 독도 주민등록 이전" },
        { year: "1998년", desc: "신한일 어업협정 체결 (독도 중간수역 포함 논란 발생)" },
        { year: "2005년", desc: "일본 시마네현 '다케시마의 날' 조례 제정으로 갈등 심화" },
        { year: "2008년", desc: "정부 연구기관 독도연구소 설립" },
        { year: "2010년대 이후", desc: "일본 교과서의 영토 왜곡 서술 급증 및 현재까지 갈등 지속" }
    ];

    // 연표를 렌더링하는 함수
    function renderTimeline(data, elementId) {
        const container = document.getElementById(elementId);
        data.forEach(item => {
            const eventDiv = document.createElement('div');
            eventDiv.className = 'event';
            eventDiv.innerHTML = `
                <div class="event-content">
                    <span class="year">${item.year}</span>
                    <p class="description">${item.desc}</p>
                </div>
            `;
            container.appendChild(eventDiv);
        });
    }

    // 실행
    renderTimeline(data1, 'section1');
    renderTimeline(data2, 'section2');
    renderTimeline(data3, 'section3');
</script>

</body>
</html>
